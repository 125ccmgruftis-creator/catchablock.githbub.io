<!DOCTYPE html>
<html>
<head>
  <title>Fang den Block</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    
    body {
      background: black;
      font-family: Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      touch-action: none;
    }
    
    /* Mobile Optimization */
    @media (max-width: 768px) {
      #menu {
        max-width: 95vw;
        padding: 20px 15px;
      }
      
      #menu h1 {
        font-size: clamp(1.2em, 4vw, 1.8em);
      }
      
      .difficulty-btn {
        min-width: 100px;
        padding: clamp(8px, 2vw, 12px) clamp(12px, 3vw, 20px);
      }
      
      .tab-btn {
        padding: 6px 12px;
        font-size: clamp(0.8em, 3vw, 1em);
      }
      
      .name-input {
        max-width: 90vw;
      }
      
      .leaderboard {
        font-size: clamp(0.85em, 3vw, 1em);
      }
      
      #stats {
        font-size: clamp(0.8em, 2vw, 1em);
      }
      
      #comboDisplay {
        font-size: clamp(0.9em, 3vw, 1.3em);
      }
      
      .btn {
        padding: clamp(6px, 1.5vw, 10px) clamp(10px, 2vw, 15px);
        font-size: clamp(0.8em, 2.5vw, 0.9em);
      }
      
      #gameOverScreen {
        padding: 20px 15px;
      }
      
      .gameOverBtn {
        padding: clamp(8px, 2vw, 12px) clamp(15px, 3vw, 25px);
        font-size: clamp(0.9em, 3vw, 1.1em);
      }
    }
    
    @media (max-width: 480px) {
      #menu {
        max-width: 98vw;
        padding: 15px 10px;
      }
      
      .tab-buttons {
        flex-direction: column;
        gap: 5px;
      }
      
      .tab-btn {
        width: 100%;
      }
      
      .difficulty-btn {
        width: 100%;
        margin: 5px 0 !important;
      }
    }
    
    /* Menu Styles */
    #menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #222;
      padding: 30px 20px;
      border-radius: 10px;
      text-align: center;
      z-index: 100;
      max-width: 90vw;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    #menu h1 {
      color: white;
      margin-bottom: 20px;
      font-size: clamp(1.5em, 5vw, 2.5em);
    }
    
    #menu p {
      color: #aaa;
      margin-bottom: 20px;
      font-size: clamp(0.9em, 4vw, 1.1em);
    }
    
    .difficulty-btn {
      background: #0099ff;
      color: white;
      border: none;
      padding: clamp(10px, 3vw, 15px) clamp(15px, 4vw, 30px);
      margin: 8px;
      font-size: clamp(1em, 4vw, 1.2em);
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
      -webkit-tap-highlight-color: transparent;
      min-width: 120px;
    }
    
    .difficulty-btn:hover, .difficulty-btn:active {
      background: #0077cc;
      transform: scale(1.05);
    }
    
    .name-input {
      width: 100%;
      max-width: 300px;
      padding: 12px;
      margin: 20px 0;
      font-size: 1.1em;
      border: 2px solid #0099ff;
      border-radius: 5px;
      background: #333;
      color: white;
      text-align: center;
    }
    
    .name-input::placeholder {
      color: #888;
    }
    
    .name-input:focus {
      outline: none;
      border-color: #00ffff;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }
    
    .tab-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    
    .tab-btn {
      background: #444;
      color: #aaa;
      border: 2px solid #444;
      padding: 8px 15px;
      cursor: pointer;
      border-radius: 5px;
      transition: 0.3s;
    }
    
    .tab-btn.active {
      background: #0099ff;
      color: white;
      border-color: #00ffff;
    }
    
    .leaderboard {
      text-align: left;
      color: #aaa;
      margin-top: 20px;
    }
    
    .leaderboard-entry {
      padding: 8px;
      border-bottom: 1px solid #444;
      color: white;
    }
    
    .leaderboard-entry.top {
      color: #ffff00;
      font-weight: bold;
    }
    
    #adminSection {
      margin-top: 30px;
      border-top: 2px solid #444;
      padding-top: 20px;
      display: none;
    }
    
    .adminSection {
      margin-top: 30px;
      border-top: 2px solid #444;
      padding-top: 20px;
      display: none;
    }
    
    .adminSection.visible {
      display: block;
    }
    
    /* Game Area */
    #gameArea {
      display: none;
      width: 100%;
      height: 100%;
      position: relative;
    }
    
    #stats {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-size: clamp(0.9em, 3vw, 1.2em);
      z-index: 50;
      line-height: 1.4;
    }
    
    #comboDisplay {
      color: #ffff00;
      font-weight: bold;
      font-size: clamp(1em, 4vw, 1.5em);
    }
    
    #timerDisplay {
      transition: color 0.2s;
    }
    
    #timerDisplay.warning {
      color: #ff0000;
      font-weight: bold;
      animation: blink 0.5s infinite;
    }
    
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0.5; }
    }
    
    #controls {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 50;
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    
    .btn {
      background: #ff6600;
      color: white;
      border: none;
      padding: clamp(8px, 2vw, 12px) clamp(12px, 3vw, 20px);
      font-size: clamp(0.9em, 3vw, 1em);
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
      -webkit-tap-highlight-color: transparent;
    }
    
    .btn:hover, .btn:active {
      background: #ff4400;
      transform: scale(1.05);
    }
    
    .btn.sound-off {
      background: #999;
    }
    
    /* Block Styles */
    #box {
      width: 100px;
      height: 100px;
      background: white;
      position: absolute;
      top: 100px;
      left: 100px;
      cursor: pointer;
      border: 3px solid #00ff00;
      border-radius: 5px;
      transition: all 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    
    #box:hover, #box:active {
      border-color: #00ffff;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
      transform: scale(1.05);
    }
    
    #box.circle {
      border-radius: 50%;
    }
    
    #box.triangle {
      width: 100px;
      height: 100px;
      background: white;
      border: none;
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
    }
    
    /* Floating Score Animation */
    .floatingScore {
      position: absolute;
      font-size: clamp(1.2em, 4vw, 2em);
      font-weight: bold;
      color: #00ff00;
      pointer-events: none;
      z-index: 40;
      animation: floatUp 1s ease-out forwards;
      text-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
    }
    
    @keyframes floatUp {
      0% {
        opacity: 1;
        transform: translateY(0);
      }
      100% {
        opacity: 0;
        transform: translateY(-80px);
      }
    }
    
    /* Achievement Popup */
    #achievementPopup {
      position: fixed;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 30px;
      border-radius: 10px;
      z-index: 200;
      text-align: center;
      display: none;
      min-width: 250px;
      border: 3px solid #00ffff;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
      animation: popInTop 0.5s ease-out;
    }
    
    @keyframes popInTop {
      0% {
        transform: translateX(-50%) translateY(-100px);
        opacity: 0;
      }
      100% {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
    }
    
    #achievementPopup h2 {
      color: #ffff00;
      font-size: 2em;
      margin-bottom: 10px;
    }
    
    /* Game Over Screen */
    #gameOverScreen {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 40px;
      border-radius: 15px;
      z-index: 150;
      text-align: center;
      display: none;
      min-width: 280px;
      border: 3px solid #00ff00;
      box-shadow: 0 0 40px rgba(0, 255, 0, 0.6);
      animation: gameOverPopIn 0.5s ease-out;
    }
    
    @keyframes gameOverPopIn {
      0% {
        transform: translate(-50%, -50%) scale(0);
        opacity: 0;
      }
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
    }
    
    #gameOverScreen h1 {
      color: #00ff00;
      font-size: 2.5em;
      margin-bottom: 20px;
    }
    
    #gameOverScreen .finalScore {
      color: #ffff00;
      font-size: 1.8em;
      margin: 20px 0;
      font-weight: bold;
    }
    
    #gameOverScreen .scoreDetails {
      color: #aaa;
      font-size: 1.1em;
      margin: 15px 0;
    }
    
    #gameOverScreen .gameOverButtons {
      display: flex;
      gap: 15px;
      margin-top: 30px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    #gameOverScreen .gameOverBtn {
      background: #0099ff;
      color: white;
      border: none;
      padding: 12px 25px;
      font-size: 1.1em;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
      min-width: 120px;
      font-weight: bold;
    }
    
    #gameOverScreen .gameOverBtn:hover {
      background: #00ccff;
      transform: scale(1.05);
    }
    
    #gameOverScreen .gameOverBtn.secondary {
      background: #ff6600;
    }
    
    #gameOverScreen .gameOverBtn.secondary:hover {
      background: #ff8833;
    }
  </style>
</head>
<body>

<div id="menu">
  <h1>🎮 Fang den Block</h1>
  
  <div class="tab-buttons">
    <button class="tab-btn active" onclick="showTab('play')">▶ Play</button>
    <button class="tab-btn" onclick="showTab('leaderboard')">🏆 Leaderboard</button>
  </div>
  
  <div id="playTab">
    <input type="text" class="name-input" id="playerName" placeholder="Gib deinen Namen ein...">
    <p style="margin-bottom: 20px;">Wähle einen Schwierigkeitsgrad:</p>
    <button class="difficulty-btn" onclick="startGame('easy')">Easy</button>
    <button class="difficulty-btn" onclick="startGame('normal')">Normal</button>
    <button class="difficulty-btn" onclick="startGame('hard')">Hard</button>
    
    <div style="margin-top: 30px; border-top: 2px solid #444; padding-top: 20px;">
      <div id="adminSectionPlay" class="adminSection">
        <p style="color: #aaa; margin-bottom: 10px;">🔐 Owner/Admin Password:</p>
        <input type="password" class="adminPasswordInput" placeholder="Enter password" style="width: 100%; max-width: 300px; padding: 8px; margin: 10px 0; font-size: 1em; border: 2px solid #666; border-radius: 5px; background: #333; color: white; text-align: center;" oninput="checkAdminPassword('play')">
        <button class="difficulty-btn deleteBtn" onclick="checkAdminAndDelete('play')" style="background: #ff3333; margin-top: 10px; display: none;">🗑️ Delete Leaderboard</button>
        <p class="adminStatus" style="color: #666; margin-top: 10px; font-size: 0.9em;"></p>
      </div>
    </div>
  </div>
  
  <div id="leaderboardTab" style="display: none;">
    <h2 style="color: #ffff00; margin-bottom: 20px;">🏆 Top 10 Scores</h2>
    <div class="leaderboard" id="leaderboardList"></div>
    
    <div id="bannedPlayersSection" style="margin-top: 30px; border-top: 2px solid #444; padding-top: 20px; display: none;">
      <h3 style="color: #ffff00; margin-bottom: 20px;">🚫 Banned Players</h3>
      <div id="bannedList" style="margin-bottom: 20px;"></div>
    </div>
    
    <div id="adminSectionLeaderboard" class="adminSection">
      <p style="color: #aaa; margin-bottom: 10px;">🔐 Owner/Admin Password:</p>
      <input type="password" class="adminPasswordInput" placeholder="Enter password" style="width: 100%; max-width: 300px; padding: 8px; margin: 10px 0; font-size: 1em; border: 2px solid #666; border-radius: 5px; background: #333; color: white; text-align: center;" oninput="checkAdminPassword('leaderboard')">
      <button class="difficulty-btn deleteBtn" onclick="checkAdminAndDelete('leaderboard')" style="background: #ff3333; margin-top: 10px; display: none;">🗑️ Delete Leaderboard</button>
      <p class="adminStatus" style="color: #666; margin-top: 10px; font-size: 0.9em;"></p>
    </div>
    </div>
  </div>
  
</div>

<div id="achievementPopup">
  <h2 id="achievementTitle">🎉 Achievement!</h2>
  <p id="achievementText"></p>
</div>

<div id="gameOverScreen">
  <h1 id="gameOverTitle">🎮 GAME OVER</h1>
  <div class="finalScore" id="finalScore">0 Punkte</div>
  <div class="scoreDetails" id="scoreDetails">Highscore: 0</div>
  <div class="gameOverButtons">
    <button class="gameOverBtn" onclick="restartGame()">▶ Neu starten</button>
    <button class="gameOverBtn secondary" onclick="goToMenu()">🔄 Hauptmenü</button>
  </div>
</div>

<div id="gameArea">
  <div id="stats">
    <div><span class="stat-label-points">Punkte:</span> <span id="score">0</span></div>
    <div><span class="stat-label-highscore">Highscore:</span> <span id="highscore">0</span></div>
    <div id="timerDisplay"><span class="stat-label-time">Zeit:</span> <span id="timer">15</span>s</div>
    <div id="comboDisplay"><span class="stat-label-combo">Combo:</span> x<span id="comboValue">1</span></div>
  </div>
  
  <div id="controls">
    <button class="btn" id="soundBtn" onclick="toggleSound()">🔊 Sound</button>
    <button class="btn" onclick="resetGame()">🔄 Menü</button>
  </div>
  
  <div id="box" onclick="moveBox()"></div>
</div>

<script>
let audioContext;
let score = 0;
let highscore = localStorage.getItem('highscore') || 0;
let timeLeft = 15;
let timerId;
let gameRunning = false;
let difficulty = 'normal';
let initialBlockSize = 100;
let lastClickTime = 0;
let combo = 1;
let adminPanelVisible = false;

// Optimize for mobile devices
function initializeMobileOptimizations() {
  if (window.innerWidth <= 480) {
    // Reduce initial block sizes for small screens
    document.documentElement.style.fontSize = '14px';
  } else if (window.innerWidth <= 768) {
    document.documentElement.style.fontSize = '15px';
  }
}

initializeMobileOptimizations();
window.addEventListener('resize', initializeMobileOptimizations);

// Tastenkombination für Admin-Bereich: Ctrl+Shift+A
document.addEventListener('keydown', function(event) {
  if (event.ctrlKey && event.shiftKey && event.key === 'A') {
    event.preventDefault();
    adminPanelVisible = !adminPanelVisible;
    toggleAdminPanels();
  }
});

function toggleAdminPanels() {
  const adminSections = document.querySelectorAll('.adminSection');
  const bannedSection = document.getElementById('bannedPlayersSection');
  
  adminSections.forEach(section => {
    if (adminPanelVisible) {
      section.classList.add('visible');
    } else {
      section.classList.remove('visible');
      // Clear passwords
      const passwordInputs = section.querySelectorAll('.adminPasswordInput');
      passwordInputs.forEach(input => input.value = '');
      const statusDivs = section.querySelectorAll('.adminStatus');
      statusDivs.forEach(div => div.textContent = '');
      const deleteBtns = section.querySelectorAll('.deleteBtn');
      deleteBtns.forEach(btn => btn.style.display = 'none');
    }
  });
  
  // Show/hide banned players section for admin
  if (bannedSection) {
    bannedSection.style.display = adminPanelVisible ? 'block' : 'none';
  }
}
let soundEnabled = true;
let leaderboard = JSON.parse(localStorage.getItem('leaderboard')) || [];
let achievements = JSON.parse(localStorage.getItem('achievements')) || [];
let bannedPlayers = JSON.parse(localStorage.getItem('bannedPlayers')) || [];
let playerName = '';
let leaderboardRefreshInterval = null;
let isAdminAuthenticated = false;

// Sprachen-System
let currentLanguage = localStorage.getItem('gameLanguage') || 'en';

const translations = {
  de: {
    title: '🎮 Fang den Block',
    play: '▶ Spielen',
    leaderboard: '🏆 Bestenliste',
    language: '🌐 Sprache',
    selectDifficulty: 'Wähle einen Schwierigkeitsgrad:',
    easy: 'Easy',
    normal: 'Normal',
    hard: 'Hard',
    enterName: 'Gib deinen Namen ein...',
    noScores: 'Noch keine Scores!',
    adminPassword: '🔐 Owner/Admin Passwort:',
    enterPassword: 'Passwort eingeben',
    deleteLeaderboard: '🗑️ Leaderboard löschen',
    accessGranted: '✓ Zugang gewährt',
    wrongPassword: '✗ Falsches Passwort',
    confirmDelete: 'Willst du wirklich ALLE Scores löschen? Das kann nicht rückgängig gemacht werden!',
    deleteSuccess: 'Leaderboard gelöscht! ✨',
    enterNamePrompt: 'Bitte gib deinen Namen ein!',
    nameExists: '❌ Dieser Name existiert bereits im Leaderboard! Verwende einen anderen Namen.',
    points: 'Punkte:',
    pointsLabel: 'Punkte',
    highscore: 'Highscore:',
    time: 'Zeit:',
    combo: 'Combo:',
    sound: '🔊 Sound',
    mute: '🔇 Mute',
    menu: '🔄 Menü',
    gameOver: '⏰ GAME OVER',
    newHighscore: '🎉 NEUER HIGHSCORE!',
    restart: '▶ Neu starten',
    mainMenu: '🔄 Hauptmenü',
    seconds: 'Sekunden',
    anonymous: 'Anonym',
    name: 'Name',
    ban: '🚫 Ban',
    unban: '✅ Unban',
    bannedPlayers: 'Gebannte Spieler',
    noBanned: 'Keine gebannten Spieler',
    playerBanned: '❌ Du bist gebannt!'
  },
  en: {
    title: '🎮 Catch the Block',
    play: '▶ Play',
    leaderboard: '🏆 Leaderboard',
    language: '🌐 Language',
    selectDifficulty: 'Select a difficulty:',
    easy: 'Easy',
    normal: 'Normal',
    hard: 'Hard',
    enterName: 'Enter your name...',
    noScores: 'No scores yet!',
    adminPassword: '🔐 Owner/Admin Password:',
    enterPassword: 'Enter password',
    deleteLeaderboard: '🗑️ Delete Leaderboard',
    accessGranted: '✓ Access Granted',
    wrongPassword: '✗ Wrong Password',
    confirmDelete: 'Do you really want to delete ALL scores? This cannot be undone!',
    deleteSuccess: 'Leaderboard deleted! ✨',
    enterNamePrompt: 'Please enter your name!',
    nameExists: '❌ This name already exists in the leaderboard! Use a different name.',
    points: 'Points:',
    pointsLabel: 'Points',
    highscore: 'Highscore:',
    time: 'Time:',
    combo: 'Combo:',
    sound: '🔊 Sound',
    mute: '🔇 Mute',
    menu: '🔄 Menu',
    gameOver: '⏰ GAME OVER',
    newHighscore: '🎉 NEW HIGHSCORE!',
    restart: '▶ Restart',
    mainMenu: '🔄 Main Menu',
    seconds: 'Seconds',
    anonymous: 'Anonymous',
    name: 'Name',
    ban: '🚫 Ban',
    unban: '✅ Unban',
    bannedPlayers: 'Banned Players',
    noBanned: 'No banned players',
    playerBanned: '❌ Du bist gebannt!',
    ban: '🚫 Ban',
    unban: '✅ Unban',
    bannedPlayers: 'Banned Players',
    noBanned: 'No banned players',
    playerBanned: '❌ You are banned!'
  }
};

function detectBrowserLanguage() {
  const browserLang = navigator.language.split('-')[0];
  return (browserLang === 'de') ? 'de' : 'en';
}

function t(key) {
  return translations[currentLanguage][key] || translations['en'][key] || key;
}

function changeLanguage(lang) {
  currentLanguage = lang;
  localStorage.setItem('gameLanguage', lang);
  updateUI();
}

function updateUI() {
  // Menu Headlines
  document.querySelector('#menu h1').textContent = t('title');
  
  // Tab Buttons
  const tabBtns = document.querySelectorAll('.tab-btn');
  if (tabBtns[0]) tabBtns[0].textContent = t('play');
  if (tabBtns[1]) tabBtns[1].textContent = t('leaderboard');
  
  // Play Tab
  document.getElementById('playerName').placeholder = t('enterName');
  
  // Find the difficulty selection paragraph
  const playTabParagraph = document.querySelector('#playTab > p');
  if (playTabParagraph) {
    playTabParagraph.textContent = t('selectDifficulty');
  }
  
  // Update difficulty buttons (only the first 3 in playTab)
  const difficultyBtns = document.querySelectorAll('#playTab .difficulty-btn');
  if (difficultyBtns[0]) difficultyBtns[0].innerHTML = t('easy');
  if (difficultyBtns[1]) difficultyBtns[1].innerHTML = t('normal');
  if (difficultyBtns[2]) difficultyBtns[2].innerHTML = t('hard');
  
  // Leaderboard Tab
  const leaderboardHeading = document.querySelector('#leaderboardTab h2');
  if (leaderboardHeading) {
    leaderboardHeading.textContent = t('leaderboard');
  }
  
  // Admin Sections Updates
  const adminSections = ['adminSectionPlay', 'adminSectionLeaderboard', 'adminSectionLanguage'];
  adminSections.forEach(sectionId => {
    const section = document.getElementById(sectionId);
    if (section) {
      const adminParagraph = section.querySelector('p');
      if (adminParagraph) adminParagraph.textContent = t('adminPassword');
      
      const passwordInput = section.querySelector('.adminPasswordInput');
      if (passwordInput) passwordInput.placeholder = t('enterPassword');
      
      const deleteBtn = section.querySelector('.deleteBtn');
      if (deleteBtn) deleteBtn.textContent = t('deleteLeaderboard');
    }
  });
  
  // Banned list heading
  const bannedHeading = document.querySelector('div:has(#bannedList) > h3');
  if (bannedHeading) {
    bannedHeading.textContent = t('bannedPlayers');
  }
  
  // Game Area buttons
  const soundBtn = document.getElementById('soundBtn');
  if (soundBtn) {
    const isMuted = soundBtn.classList.contains('sound-off');
    soundBtn.textContent = isMuted ? t('mute') : t('sound');
  }
  
  const menuBtn = document.querySelector('#controls .btn:last-child');
  if (menuBtn) {
    menuBtn.textContent = t('menu');
  }
  
  // Game Over Screen
  const gameOverTitle = document.getElementById('gameOverTitle');
  if (gameOverTitle) {
    gameOverTitle.textContent = t('gameOver');
  }
  
  const gameOverButtons = document.querySelectorAll('#gameOverScreen .gameOverBtn');
  if (gameOverButtons[0]) gameOverButtons[0].textContent = t('restart');
  if (gameOverButtons[1]) gameOverButtons[1].textContent = t('mainMenu');
  
  // Update game stat labels
  const statLabels = {
    'stat-label-points': t('points'),
    'stat-label-highscore': t('highscore'),
    'stat-label-time': t('time'),
    'stat-label-combo': t('combo')
  };
  
  for (const [className, label] of Object.entries(statLabels)) {
    const element = document.querySelector(`.${className}`);
    if (element) {
      element.textContent = label + ':';
    }
  }
}

function updateGameStatsDisplay() {
  // This function updates the dynamic values
  // Currently handled by moveBox(), countDown(), and updateCombo()
}

const shapes = ['square', 'circle', 'triangle'];
let currentShapeIndex = 0;

// Achievement Definitionen
const achievementDefs = {
  combo5: { name: "5x Combo!", desc: "Erreiche eine 5er Combo", condition: () => combo >= 5 },
  combo10: { name: "10x Combo!", desc: "Erreiche eine 10er Combo", condition: () => combo >= 10 },
  combo20: { name: "MEGA Combo!", desc: "Erreiche 20x Combo", condition: () => combo >= 20 },
  score50: { name: "50 Punkte!", desc: "Sammle 50 Punkte", condition: () => score >= 50 },
  score100: { name: "100 Punkte!", desc: "Sammle 100 Punkte", condition: () => score >= 100 },
  score200: { name: "200 Punkte!", desc: "Sammle 200 Punkte", condition: () => score >= 200 },
};

function showTab(tab) {
  document.getElementById('playTab').style.display = tab === 'play' ? 'block' : 'none';
  document.getElementById('leaderboardTab').style.display = tab === 'leaderboard' ? 'block' : 'none';
  
  if (tab === 'play') {
    checkBanStatus();
  }
  
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  if (event && event.target) event.target.classList.add('active');
  
  if (tab === 'leaderboard') {
    displayLeaderboard();
    
    // Starte automatische Aktualisierung alle 15 Sekunden
    if (leaderboardRefreshInterval) {
      clearInterval(leaderboardRefreshInterval);
    }
    leaderboardRefreshInterval = setInterval(() => {
      displayLeaderboard();
    }, 15000);
  } else {
    // Stoppe automatische Aktualisierung wenn man den Tab verlässt
    if (leaderboardRefreshInterval) {
      clearInterval(leaderboardRefreshInterval);
      leaderboardRefreshInterval = null;
    }
  }
}

function checkWeeklyReset() {
  const lastResetDate = localStorage.getItem('leaderboardLastReset');
  const today = new Date();
  const todayString = today.toISOString().split('T')[0];
  
  if (!lastResetDate) {
    localStorage.setItem('leaderboardLastReset', todayString);
    return;
  }
  
  const lastReset = new Date(lastResetDate);
  const daysDiff = Math.floor((today - lastReset) / (1000 * 60 * 60 * 24));
  
  if (daysDiff >= 7) {
    leaderboard = [];
    achievements = [];
    localStorage.setItem('leaderboard', JSON.stringify(leaderboard));
    localStorage.setItem('achievements', JSON.stringify(achievements));
    localStorage.setItem('leaderboardLastReset', todayString);
    console.log('📅 Wöchentliches Reset durchgeführt!');
  }
}

function displayLeaderboard() {
  checkWeeklyReset();
  
  const list = document.getElementById('leaderboardList');
  list.innerHTML = '';
  
  if (leaderboard.length === 0) {
    list.innerHTML = `<div class="leaderboard-entry">${t('noScores')}</div>`;
  } else {
    leaderboard.sort((a, b) => b.score - a.score).slice(0, 10).forEach((entry, idx) => {
      const divEntry = document.createElement('div');
      divEntry.className = 'leaderboard-entry' + (idx === 0 ? ' top' : '');
      const isBanned = bannedPlayers.includes(entry.name);
      const banStatus = isBanned ? ' ⛔ (BANNED)' : '';
      const banButton = isAdminAuthenticated ? `<button style="float: right; background: #ff3333; color: white; border: none; padding: 3px 8px; border-radius: 3px; cursor: pointer; font-size: 0.8em;" onclick="banPlayer('${entry.name}')">${t('ban')}</button>` : '';
      divEntry.innerHTML = `${idx + 1}. ${entry.name || t('anonymous')} - ${entry.score} ${t('pointsLabel')}${banStatus}${banButton}`;
      list.appendChild(divEntry);
    });
  }
  
  displayBannedList();
}

function displayBannedList() {
  const bannedListDiv = document.getElementById('bannedList');
  if (!bannedListDiv) return;
  
  bannedListDiv.innerHTML = '';
  if (bannedPlayers.length === 0) {
    bannedListDiv.innerHTML = `<p style="color: #aaa;">${t('noBanned')}</p>`;
  } else {
    bannedPlayers.forEach(name => {
      const divEntry = document.createElement('div');
      divEntry.className = 'leaderboard-entry';
      const unbanButton = isAdminAuthenticated ? `<button style="float: right; background: #00cc44; color: white; border: none; padding: 3px 8px; border-radius: 3px; cursor: pointer; font-size: 0.8em;" onclick="unbanPlayer('${name}')">${t('unban')}</button>` : '';
      divEntry.innerHTML = `🚫 ${name}${unbanButton}`;
      bannedListDiv.appendChild(divEntry);
    });
  }
}

function banPlayer(playerName) {
  if (!isAdminAuthenticated) {
    alert('🔒 Only Owner/Admin can ban players.');
    return;
  }

  if (!bannedPlayers.includes(playerName)) {
    bannedPlayers.push(playerName);
    localStorage.setItem('bannedPlayers', JSON.stringify(bannedPlayers));
    displayLeaderboard();
  }
}

function unbanPlayer(playerName) {
  if (!isAdminAuthenticated) {
    alert('🔒 Only Owner/Admin can unban players.');
    return;
  }

  bannedPlayers = bannedPlayers.filter(name => name !== playerName);
  localStorage.setItem('bannedPlayers', JSON.stringify(bannedPlayers));
  displayLeaderboard();
}

function clearLeaderboard(tab = 'leaderboard') {
  if (confirm(t('confirmDelete'))) {
    leaderboard = [];
    achievements = [];
    localStorage.setItem('leaderboard', JSON.stringify(leaderboard));
    localStorage.setItem('achievements', JSON.stringify(achievements));
    displayLeaderboard();
    alert(t('deleteSuccess'));
    
    // Reset all admin sections
    const adminSections = ['adminSectionPlay', 'adminSectionLeaderboard', 'adminSectionLanguage'];
    adminSections.forEach(sectionId => {
      const section = document.getElementById(sectionId);
      if (section) {
        const passwordInput = section.querySelector('.adminPasswordInput');
        const deleteBtn = section.querySelector('.deleteBtn');
        const adminStatus = section.querySelector('.adminStatus');
        if (passwordInput) passwordInput.value = '';
        if (deleteBtn) deleteBtn.style.display = 'none';
        if (adminStatus) adminStatus.textContent = '';
      }
    });
  }
}

function checkAdminPassword(tab = 'leaderboard') {
  const adminSection = document.getElementById(`adminSection${tab.charAt(0).toUpperCase() + tab.slice(1)}`);
  if (!adminSection) return;
  
  const adminPassword = adminSection.querySelector('.adminPasswordInput').value;
  const deleteBtn = adminSection.querySelector('.deleteBtn');
  const adminStatus = adminSection.querySelector('.adminStatus');
  const correctPassword = 'Kx#9mP$2vLq@5'; // Secure password
  
  if (adminPassword === correctPassword) {
    isAdminAuthenticated = true;
    if (deleteBtn) deleteBtn.style.display = 'block';
    adminStatus.style.color = '#00ff00';
    adminStatus.textContent = t('accessGranted');
  } else if (adminPassword.length > 0) {
    isAdminAuthenticated = false;
    if (deleteBtn) deleteBtn.style.display = 'none';
    adminStatus.style.color = '#ff0000';
    adminStatus.textContent = t('wrongPassword');
  } else {
    isAdminAuthenticated = false;
    if (deleteBtn) deleteBtn.style.display = 'none';
    adminStatus.textContent = '';
  }
}

function checkAdminAndDelete(tab = 'leaderboard') {
  const adminSection = document.getElementById(`adminSection${tab.charAt(0).toUpperCase() + tab.slice(1)}`);
  if (!adminSection) return;
  
  clearLeaderboard(tab);
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('soundBtn');
  btn.textContent = soundEnabled ? t('sound') : t('mute');
  btn.classList.toggle('sound-off');
}

function checkAchievements() {
  Object.keys(achievementDefs).forEach(key => {
    if (!achievements.includes(key) && achievementDefs[key].condition()) {
      achievements.push(key);
      localStorage.setItem('achievements', JSON.stringify(achievements));
      showAchievement(key);
    }
  });
}

function showAchievement(key) {
  const ach = achievementDefs[key];
  const popup = document.getElementById('achievementPopup');
  document.getElementById('achievementTitle').textContent = '🎉 ' + ach.name;
  document.getElementById('achievementText').textContent = ach.desc;
  
  popup.style.display = 'block';
  setTimeout(() => {
    popup.style.display = 'none';
  }, 3000);
}

function playSound() {
  if (!soundEnabled) return;
  
  if (!audioContext) {
    try {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      console.log('AudioContext nicht verfügbar');
      return;
    }
  }
  
  try {
    const oscillator = audioContext.createOscillator();
    const gain = audioContext.createGain();
    
    oscillator.connect(gain);
    gain.connect(audioContext.destination);
    
    let frequency = 600 + (score * 20) + (combo * 50);
    oscillator.frequency.value = Math.min(frequency, 2000);
    oscillator.type = 'sine';
    
    gain.gain.setValueAtTime(0.3, audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
    
    oscillator.start(audioContext.currentTime);
    oscillator.stop(audioContext.currentTime + 0.1);
  } catch (e) {
    console.log('Sound error');
  }
}

function updateCombo() {
  document.getElementById("comboValue").textContent = combo;
  const comboDisplay = document.getElementById("comboDisplay");
  if (combo > 1) {
    comboDisplay.style.color = combo > 5 ? '#ff00ff' : '#ffff00';
  } else {
    comboDisplay.style.color = '#ffff00';
  }
  
  clearTimeout(comboTimeout);
  comboTimeout = setTimeout(() => {
    combo = 1;
    document.getElementById("comboValue").textContent = "1";
    comboDisplay.style.color = '#ffff00';
  }, 1500);
}

function showFloatingScore(points, x, y) {
  const floatingScore = document.createElement("div");
  floatingScore.className = "floatingScore";
  floatingScore.textContent = "+" + points;
  floatingScore.style.left = x + "px";
  floatingScore.style.top = y + "px";
  document.getElementById("gameArea").appendChild(floatingScore);
  
  setTimeout(() => floatingScore.remove(), 1000);
}

function getBlockSize() {
  let minSize = 40;
  let reduction = score * 2;
  return Math.max(initialBlockSize - reduction, minSize);
}

function updateBlockSize() {
  let size = getBlockSize();
  let box = document.getElementById("box");
  box.style.width = size + "px";
  box.style.height = size + "px";
  box.style.border = "3px solid #00ff00";
}

function changeBlockShape() {
  currentShapeIndex = (currentShapeIndex + 1) % shapes.length;
  let box = document.getElementById("box");
  box.className = shapes[currentShapeIndex];
}

function moveBox() {
  if (timeLeft <= 0 || !gameRunning) return;
  
  let currentTime = Date.now();
  if (currentTime - lastClickTime < 1000) {
    combo++;
  } else {
    combo = 1;
  }
  lastClickTime = currentTime;
  updateCombo();
  
  playSound();
  
  let points = combo;
  score += points;
  document.getElementById("score").textContent = score;
  checkAchievements();
  
  let box = document.getElementById("box");
  let boxRect = box.getBoundingClientRect();
  showFloatingScore(points, boxRect.left + boxRect.width / 2, boxRect.top);
  
  updateBlockSize();
  changeBlockShape();

  let size = getBlockSize();
  let x = Math.random() * (Math.max(0, window.innerWidth - size));
  let y = Math.random() * (Math.max(0, window.innerHeight - size));
  box.style.left = x + "px";
  box.style.top = y + "px";
}

function countDown() {
  if (timeLeft > 0) {
    timeLeft--;
    document.getElementById("timer").textContent = timeLeft;
    
    // Warning wenn Zeit knapp wird (< 5 Sekunden)
    const timerDisplay = document.getElementById("timerDisplay");
    if (timeLeft < 5 && timeLeft > 0) {
      timerDisplay.classList.add('warning');
    } else {
      timerDisplay.classList.remove('warning');
    }
  } else {
    endGame();
  }
}

function endGame() {
  gameRunning = false;
  clearInterval(timerId);
  clearTimeout(comboTimeout);
  
  // Speichere Score mit Namen in Leaderboard
  leaderboard.push({
    name: playerName || 'Anonym',
    score: score
  });
  localStorage.setItem('leaderboard', JSON.stringify(leaderboard));
  
  let isNewHighscore = false;
  if (score > highscore) {
    highscore = score;
    localStorage.setItem('highscore', highscore);
    document.getElementById("highscore").textContent = highscore;
    isNewHighscore = true;
  }
  
  // Zeige Game Over Screen
  const gameOverScreen = document.getElementById('gameOverScreen');
  const gameOverTitle = document.getElementById('gameOverTitle');
  const finalScore = document.getElementById('finalScore');
  const scoreDetails = document.getElementById('scoreDetails');
  
  if (isNewHighscore) {
    gameOverTitle.textContent = t('newHighscore');
    gameOverTitle.style.color = '#ffff00';
  } else {
    gameOverTitle.textContent = t('gameOver');
    gameOverTitle.style.color = '#00ff00';
  }
  
  finalScore.textContent = score + ' ' + t('pointsLabel');
  scoreDetails.textContent = t('highscore') + ' ' + highscore + ' | ' + t('name') + ': ' + (playerName || t('anonymous'));
  gameOverScreen.style.display = 'block';
  
  document.getElementById("box").style.display = "none";
}

function restartGame() {
  document.getElementById('gameOverScreen').style.display = 'none';
  const selectedDifficulty = difficulty;
  
  score = 0;
  combo = 1;
  currentShapeIndex = 0;
  gameRunning = true;
  
  if (selectedDifficulty === 'easy') {
    timeLeft = 20;
    initialBlockSize = 120;
  } else if (selectedDifficulty === 'normal') {
    timeLeft = 15;
    initialBlockSize = 100;
  } else if (selectedDifficulty === 'hard') {
    timeLeft = 10;
    initialBlockSize = 80;
  }
  
  document.getElementById("score").textContent = score;
  document.getElementById("timer").textContent = timeLeft;
  document.getElementById("timerDisplay").classList.remove('warning');
  document.getElementById("comboValue").textContent = "1";
  
  let box = document.getElementById("box");
  box.style.display = "block";
  box.className = "square";
  box.style.width = initialBlockSize + "px";
  box.style.height = initialBlockSize + "px";
  box.style.borderRadius = "5px";
  
  timerId = setInterval(countDown, 1000);
}

function goToMenu() {
  document.getElementById('gameOverScreen').style.display = 'none';
  document.getElementById("gameArea").style.display = "none";
  document.getElementById("menu").style.display = "block";
  document.getElementById("box").style.display = "none";
}

function isPlayerBanned(name) {
  const normalized = name.trim().toLowerCase();
  return bannedPlayers.some(b => b.trim().toLowerCase() === normalized);
}

function checkBanStatus() {
  const nameInput = document.getElementById('playerName');
  const difficultyButtons = document.querySelectorAll('.difficulty-btn');
  const name = nameInput.value.trim();

  if (name && isPlayerBanned(name)) {
    alert(t('playerBanned'));
    difficultyButtons.forEach(btn => btn.disabled = true);
    return true;
  }

  difficultyButtons.forEach(btn => btn.disabled = false);
  return false;
}

function startGame(selectedDifficulty) {
  // Prüfe ob Name eingegeben wurde
  playerName = document.getElementById('playerName').value.trim();
  if (!playerName) {
    alert(t('enterNamePrompt'));
    return;
  }
  
  // Prüfe ob Spieler gebannt ist
  if (isPlayerBanned(playerName)) {
    alert(t('playerBanned'));
    return;
  }
  
  // Prüfe ob Name bereits im Leaderboard existiert
  const nameExists = leaderboard.some(entry => entry.name.toLowerCase() === playerName.toLowerCase());
  if (nameExists) {
    alert(t('nameExists'));
    return;
  }
  
  difficulty = selectedDifficulty;
  
  if (difficulty === 'easy') {
    timeLeft = 20;
    initialBlockSize = 120;
  } else if (difficulty === 'normal') {
    timeLeft = 15;
    initialBlockSize = 100;
  } else if (difficulty === 'hard') {
    timeLeft = 10;
    initialBlockSize = 80;
  }
  
  score = 0;
  combo = 1;
  currentShapeIndex = 0;
  gameRunning = true;
  
  document.getElementById("menu").style.display = "none";
  document.getElementById("gameArea").style.display = "block";
  document.getElementById("score").textContent = score;
  document.getElementById("highscore").textContent = highscore;
  document.getElementById("timer").textContent = timeLeft;
  document.getElementById("timerDisplay").classList.remove('warning');
  document.getElementById("comboValue").textContent = "1";
  
  let box = document.getElementById("box");
  box.style.display = "block";
  box.className = "square";
  box.style.width = initialBlockSize + "px";
  box.style.height = initialBlockSize + "px";
  box.style.borderRadius = "5px";
  
  timerId = setInterval(countDown, 1000);
}

function resetGame() {
  document.getElementById('gameOverScreen').style.display = 'none';
  gameRunning = false;
  clearInterval(timerId);
  clearTimeout(comboTimeout);
  document.getElementById("gameArea").style.display = "none";
  document.getElementById("menu").style.display = "block";
  document.getElementById("box").style.display = "none";
}

document.addEventListener('touchstart', (e) => {
  if (gameRunning && e.target.id === 'box') {
    moveBox();
  }
}, false);

window.onload = function() {
  document.getElementById("highscore").textContent = highscore;

  const nameInput = document.getElementById('playerName');
  if (nameInput) {
    nameInput.addEventListener('input', checkBanStatus);
    checkBanStatus();
  }

  // Tastenkombination für Admin-Bereich: Ctrl+Shift+A
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.shiftKey && e.key === 'A') {
      e.preventDefault();
      const adminSection = document.getElementById('adminSection');
      if (adminSection.style.display === 'none') {
        adminSection.style.display = 'block';
        document.getElementById('adminPasswordInput').focus();
      } else {
        adminSection.style.display = 'none';
        document.getElementById('adminPasswordInput').value = '';
        document.getElementById('deleteBtn').style.display = 'none';
        document.getElementById('adminStatus').textContent = '';
      }
    }
  });
}

// Initialize UI on page load
updateUI();
